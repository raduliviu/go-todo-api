AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Go Todo API on AWS Lambda
Globals:
  Function:
    Timeout: 30
Resources:
  TodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: TodoFunction
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
      - x86_64
      Layers:
      - arn:aws:lambda:eu-central-1:753240598075:layer:LambdaAdapterLayerX86:22
      Environment:
        Variables:
          PORT: '8080'
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: makefile
      SamResourceId: TodoFunction
